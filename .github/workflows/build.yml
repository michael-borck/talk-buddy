name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Build embedded server (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd embedded-server
          python -m pip install --upgrade pip
          # Install lightweight pywhispercpp instead of openai-whisper (saves ~1.6GB)
          pip install piper-tts flask flask-cors pywhispercpp pyinstaller
          
          # Download Piper voice models
          mkdir -p models
          curl -L -o models/en_GB-alan-low.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_GB/alan/low/en_GB-alan-low.onnx
          curl -L -o models/en_GB-alan-low.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_GB/alan/low/en_GB-alan-low.onnx.json
          curl -L -o models/en_US-amy-low.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/amy/low/en_US-amy-low.onnx
          curl -L -o models/en_US-amy-low.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/amy/low/en_US-amy-low.onnx.json
          
          # Download whisper-tiny model for pywhispercpp (will be included in build)
          # Pinned to an immutable revision, not the mutable main branch.
          mkdir -p whisper-models
          curl -L -o whisper-models/ggml-tiny.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/5359861c739e955e79d9a303bcbc70fb988958b1/ggml-tiny.bin

          # Verify pinned checksums — these files ship inside the packaged
          # binary, so a compromised upstream must fail the build, not ship.
          shasum -a 256 -c <<'CHECKSUMS'
          a1f60584620a2bed203de823d08f5abb336fb15f3d6f33f8c341e3e2cabf5dde  models/en_GB-alan-low.onnx
          c8164cc04b6ce102c651ce4a1e788e8429fa638501fca0723860718d4b44637e  models/en_GB-alan-low.onnx.json
          a5a91abb7de0f104358a25aded480ddacf1ff0762886325886ec406a2e86aab3  models/en_US-amy-low.onnx
          2250a9a605b8dc35a116717fadc5056695dd809e34a15d02f72a0f52d53d3ebb  models/en_US-amy-low.onnx.json
          be07e048e1e599ad46341c8d2a135645097a538221678b7acdd1b1919c6e1b21  whisper-models/ggml-tiny.bin
          CHECKSUMS

          # Create PyInstaller executable with optimizations
          pyinstaller --onefile \
            --add-data "models:models" \
            --add-data "whisper-models:whisper-models" \
            --exclude-module torch \
            --exclude-module tensorflow \
            --exclude-module PIL \
            --exclude-module matplotlib \
            --exclude-module pandas \
            --exclude-module scipy \
            --strip \
            --name embedded-server server.py
          
          # Copy executable to main project for Electron to bundle
          mkdir -p ../dist-server
          cp dist/embedded-server* ../dist-server/

      - name: Build embedded server (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd embedded-server
          python -m pip install --upgrade pip
          pip install piper-tts flask flask-cors pywhispercpp pyinstaller
          
          mkdir models
          curl -L -o models/en_GB-alan-low.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_GB/alan/low/en_GB-alan-low.onnx
          curl -L -o models/en_GB-alan-low.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_GB/alan/low/en_GB-alan-low.onnx.json
          curl -L -o models/en_US-amy-low.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/amy/low/en_US-amy-low.onnx
          curl -L -o models/en_US-amy-low.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/amy/low/en_US-amy-low.onnx.json
          
          mkdir whisper-models
          curl -L -o whisper-models/ggml-tiny.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/5359861c739e955e79d9a303bcbc70fb988958b1/ggml-tiny.bin

          # Verify pinned checksums (same pins as the Unix step / server.py)
          $expected = @{
            "models/en_GB-alan-low.onnx"      = "a1f60584620a2bed203de823d08f5abb336fb15f3d6f33f8c341e3e2cabf5dde"
            "models/en_GB-alan-low.onnx.json" = "c8164cc04b6ce102c651ce4a1e788e8429fa638501fca0723860718d4b44637e"
            "models/en_US-amy-low.onnx"       = "a5a91abb7de0f104358a25aded480ddacf1ff0762886325886ec406a2e86aab3"
            "models/en_US-amy-low.onnx.json"  = "2250a9a605b8dc35a116717fadc5056695dd809e34a15d02f72a0f52d53d3ebb"
            "whisper-models/ggml-tiny.bin"    = "be07e048e1e599ad46341c8d2a135645097a538221678b7acdd1b1919c6e1b21"
          }
          foreach ($f in $expected.Keys) {
            $actual = (Get-FileHash $f -Algorithm SHA256).Hash.ToLower()
            if ($actual -ne $expected[$f]) {
              Write-Error "Checksum mismatch for ${f}: $actual"
              exit 1
            }
          }

          pyinstaller --onefile --add-data "models;models" --add-data "whisper-models;whisper-models" --exclude-module torch --exclude-module tensorflow --exclude-module PIL --exclude-module matplotlib --exclude-module pandas --exclude-module scipy --name embedded-server server.py
          
          mkdir ..\dist-server
          copy dist\embedded-server* ..\dist-server\

      - name: Build Vite app
        run: npm run build

      - name: Build Electron app (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run electron:build -- --win --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run electron:build -- --mac --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Renamed from APPLE_* to NOTARIZE_APPLE_* so electron-builder
          # doesn't auto-detect them and trigger its own (buggy) notarize
          # wrapper. Our scripts/notarize.js afterSign hook reads these.
          NOTARIZE_APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARIZE_APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          NOTARIZE_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Free disk space (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Available space before cleanup:"
          df -h
          # Remove unnecessary packages and files to free space
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af
          # Clean up embedded server build artifacts (keeping dist-server for Electron)
          rm -rf embedded-server/build embedded-server/__pycache__
          find embedded-server -name "*.pyc" -delete 2>/dev/null || true
          # Clean up large Python cache files
          pip cache purge 2>/dev/null || true
          echo "Available space after cleanup:"
          df -h

      - name: Build Electron app (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run electron:build -- --linux --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-distributables
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.dmg
            dist/*.pkg
            dist/*.AppImage
            dist/*.deb
            dist/*.snap
            dist/*.yml
            dist/*.yaml
          retention-days: 5

  publish:
    # Promote the draft release that electron-builder's --publish=always
    # creates into a published "Latest" release — but only after every
    # matrix build has succeeded, so we never publish a partial release
    # missing one or more platforms.
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as published and Latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Publishing release $TAG"
          gh release edit "$TAG" \
            --draft=false \
            --latest \
            --repo "${{ github.repository }}"
